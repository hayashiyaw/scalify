# Local S3-compatible storage for avatar uploads (SCA0020 / issue #49).
# API: http://localhost:9000 — Console: http://localhost:9001
# Create a bucket named like S3_BUCKET in .env (default: scalify) and set a
# public read policy on `avatars/*` only; uploads use presigned PUT from the app.

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  minio_data:
